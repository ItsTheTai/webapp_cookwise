<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise - Favoriten</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* 1. FIXES THE BACKGROUND CUTOFF */
        html, body {
            min-height: 100vh !important;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-favorites) !important;
            background-attachment: fixed !important;
        }

        /* 2. MAKE SURE THE CARD CAN CONTAIN AN ABSOLUTE BUTTON */
        .recipe-card {
            position: relative !important;
        }

        /* 3. STYLING FOR THE DYNAMICALLY INJECTED BUTTON */
        .delete-recipe-btn {
            position: absolute !important;
            top: 10px !important;
            right: 10px !important;
            z-index: 9999 !important; /* Forces it above the blurred background image */
            
            background-color: rgba(24, 24, 24, 0.8) !important;
            border: 1px solid var(--prime-color3) !important;
            color: var(--white) !important;
            
            width: 30px !important;
            height: 30px !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 0 !important;
            cursor: pointer !important;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .delete-recipe-btn:hover {
            background-color: var(--red) !important;
            border-color: var(--red) !important;
            color: #ffffff !important;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <main class="custom-center-container my-4">
        <h1 class="main-logo-font mb-4">Meine Favoriten</h1>
        <div id="recipes"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle_theme.js"></script>
    <script src="../js/load_components.js"></script>

    <script>
        // Wait a brief moment for load_components.js to fetch and append the recipes.html content
        window.addEventListener('DOMContentLoaded', () => {
            const checkExist = setInterval(() => {
                const cards = document.querySelectorAll('.recipe-card');
                
                if (cards.length > 0) {
                    clearInterval(checkExist); // Stop looking once components are found
                    
                    cards.forEach(card => {
                        // Create the button element
                        const deleteBtn = document.createElement('button');
                        deleteBtn.className = 'delete-recipe-btn';
                        deleteBtn.title = 'Aus Favoriten entfernen';
                        deleteBtn.innerHTML = '<i class="bi bi-trash"></i>';
                        
                        // Prevent clicking the delete button from triggering the recipe card link redirect
                        deleteBtn.addEventListener('click', (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            // Visual mock delete effect
                            card.closest('.col-custom-grid').style.opacity = '0.3'; 
                        });

                        // Prepend it directly to the card container
                        card.prepend(deleteBtn);
                    });
                }
            }, 100); // Check every 100ms
        });
    </script>

</body>

</html>
