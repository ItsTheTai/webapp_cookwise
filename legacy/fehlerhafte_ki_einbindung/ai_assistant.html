<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Assistent - CookWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/ai.css">

    <script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>

</head>

<body style="background: var(--bg-planner); background-attachment: fixed;">

    <div id="navbar"></div>

    <main class="custom-center-container my-1">
        
        <div class="d-flex justify-content-between align-items-center ai-title-container mb-4">
            <h1 class="ai-heading h2 m-0">KI-Assistent</h1>
            <div class="btn-group ai-toggle-group" role="group" aria-label="KI Modus Auswahl">
                <button type="button" id="btn-mode-chat" class="btn btn-toggle-ai px-4 active">Chat</button>
                <button type="button" id="btn-mode-planner" class="btn btn-toggle-ai px-4">Kochplaner</button>
            </div>
        </div>

        <div id="ai-content-wrapper">
            <div id="view-chat" class="ai-view">
                <div class="chat-box-container">
                    <div class="chat-messages" id="chat-messages">
                        <div class="msg-bubble msg-ai">
                            Hallo! Ich bin dein CookWise KI-Assistent. Frag mich alles rund um Rezepte, Zutaten-Ersatz oder Kochtechniken! 😊
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="input-group">
                            <input type="text" id="chat-input" class="form-control search-custom border-custom" placeholder="Frage an die Koch-KI eingeben..." aria-label="KI Nachricht">
                            <button id="btn-send" class="btn btn-outline-secondary search-custom border-custom px-4" type="button">
                                <i class="bi bi-send"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-planner" class="ai-view d-none">
                <div class="row g-4">
                    
                    <div class="col-md-6">
                        <div class="planner-card-left">
                            <h3 class="h5 mb-3 fw-bold"><i class="bi bi-list-task text-cyan me-2"></i>Optimierte Kochschritte</h3>
                            <div class="scrollable-steps" id="ki-steps-container">
                                </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="planner-card-right">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h3 class="h5 m-0 fw-bold"><i class="bi bi-journal-check text-warning me-2"></i>Aktuelles Menü</h3>
                                <button id="btn-clear-all" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                                    <i class="bi bi-trash3 me-1"></i>Alles leeren
                                </button>
                            </div>
                            
                            <div id="selected-recipes-list" class="flex-grow-1 pe-1 spec-scroll-area mb-3">
                                </div>

                        </div> 
                    </div> 
                    
                </div> 
            </div> 
        </div> 
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/load_components.js"></script>
    <script src="/js/toggle_theme.js"></script>
    <script type="module" src="/js/ai_logic.js"></script>
</body>

</html>
