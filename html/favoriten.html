<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise - Favoriten</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        /* 1. FIXES THE BACKGROUND CUTOFF */
        html, body {
            min-height: 100vh !important;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-favorites) !important;
            background-attachment: fixed !important;
        }

        /* 2. MAKE SURE THE CARD CAN CONTAIN AN ABSOLUTE BUTTON */
        .recipe-card {
            position: relative !important;
        }

        /* 3. STYLING FOR THE DYNAMICALLY INJECTED BUTTON */
        .delete-recipe-btn {
            position: absolute !important;
            top: 10px !important;
            right: 10px !important;
            z-index: 9999 !important; /* Forces it above the blurred background image */
            
            background-color: rgba(24, 24, 24, 0.8) !important;
            border: 1px solid var(--prime-color3) !important;
            color: var(--white) !important;
            
            width: 30px !important;
            height: 30px !important;
            border-radius: 50% !important;
            display: flex !important;
            align-items: center;
            justify-content: center;
            padding: 0 !important;
            cursor: pointer !important;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .delete-recipe-btn:hover {
            background-color: var(--red) !important;
            border-color: var(--red) !important;
            color: #ffffff !important;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <main class="custom-center-container my-4">
        <h1 class="main-logo-font mb-4">Meine Favoriten</h1>
        <div id="favorite-recipes-grid"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle_theme.js"></script>
    <script src="../js/load_components.js"></script>

   <script>
        window.addEventListener('DOMContentLoaded', () => {
            // Target the unique wrapper ID to circumvent the load_components overwrite
            const recipesContainer = document.getElementById('favorite-recipes-grid');
            
            function displayFavorites() {
                const favorites = JSON.parse(localStorage.getItem("recipe_favorites")) || [];
                
                if (!recipesContainer) return;

                if (favorites.length === 0) {
                    recipesContainer.innerHTML = `
                        <div class="text-center py-5">
                            <p class="text-muted fs-5">Du hast noch keine Favoriten gespeichert.</p>
                            <a href="../html/landing.html" class="btn btn-outline-primary rounded-pill">Rezepte entdecken</a>
                        </div>`;
                    return;
                }

                let htmlContent = '<div class="row row-cols-1 row-cols-md-3 g-4">';
                
                favorites.forEach((recipe, index) => {
                    htmlContent += `
                        <div class="col col-custom-grid">
                            <div class="card h-100 recipe-card shadow-sm border-0 bg-dark text-light" style="border-radius: 15px; overflow: hidden;">
                                <button class="delete-recipe-btn" title="Aus Favoriten entfernen" data-index="${index}">
                                    <i class="bi bi-trash"></i>
                                </button>
                                
                                <a href="rezeptkarte_2.html?id=${recipe.id}" class="text-decoration-none text-reset h-100 d-flex flex-column">
                                    <img src="${recipe.bild_url}" class="card-img-top" alt="${recipe.titel}" style="height: 200px; object-fit: cover;">
                                    <div class="card-body d-flex flex-column">
                                        <h5 class="card-title main-logo-font">${recipe.titel}</h5>
                                        <p class="card-text text-muted small flex-grow-1">${recipe.kurzbeschreibung || ''}</p>
                                    </div>
                                </a>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += '</div>';
                recipesContainer.innerHTML = htmlContent;

                attachDeleteListeners(favorites);
            }

            function attachDeleteListeners(favorites) {
                const deleteButtons = document.querySelectorAll('.delete-recipe-btn');
                deleteButtons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        e.stopPropagation();

                        const indexToRemove = btn.getAttribute('data-index');
                        const cardContainer = btn.closest('.col-custom-grid');
                        
                        if (cardContainer) {
                            cardContainer.style.transition = 'opacity 0.3s ease';
                            cardContainer.style.opacity = '0';
                        }

                        setTimeout(() => {
                            favorites.splice(indexToRemove, 1);
                            localStorage.setItem("recipe_favorites", JSON.stringify(favorites));
                            displayFavorites();
                        }, 300);
                    });
                });
            }

            // A small timeout ensures components load their layout dependencies first
            setTimeout(displayFavorites, 150);
        });
    </script>

</body>

</html>
