<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise - Favoriten</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">

    <style>
        html, body {
            min-height: 100vh !important;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-favorites) !important;
            background-attachment: fixed !important;
        }

        .recipe-card {
            position: relative !important;
        }
    </style>
</head>

<body>

    <div id="navbar"></div>

    <main class="custom-center-container my-4">
        <h1 class="main-logo-font mb-4">Meine Favoriten</h1>
        <div id="recipes"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle_theme.js"></script>
    <script src="../js/load_components.js"></script>
    <script src="../js/recipe_storage.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('../html/components/buttons.html');
                const buttonsTemplateHtml = await response.text();

                const parser = new DOMParser();
                const templateDoc = parser.parseFromString(buttonsTemplateHtml, 'text/html');
                
                const embeddedStyle = templateDoc.querySelector('style');
                if (embeddedStyle) document.head.appendChild(embeddedStyle);

                const embeddedScript = templateDoc.querySelector('script');
                if (embeddedScript) {
                    const scriptTag = document.createElement('script');
                    scriptTag.text = embeddedScript.text;
                    document.body.appendChild(scriptTag);
                }

                const actionContainerTemplate = templateDoc.querySelector('.recipe-actions-container');
                if (!actionContainerTemplate) return;

                const checkExist = setInterval(() => {
                    const cards = document.querySelectorAll('.recipe-card');
                    
                    if (cards.length > 0) {
                        clearInterval(checkExist);
                        if (typeof window.initRecipeButtons === 'function') {
                            window.initRecipeButtons(cards, actionContainerTemplate);
                        }
                    }
                }, 100);
                
            } catch (error) {
                console.error("Error loading external action buttons template:", error);
            }
        });
    </script>
</body>
</html>
