<style>
    .recipe-actions-container {
        position: absolute !important;
        top: 10px !important;
        right: 10px !important;
        z-index: 9999 !important;
        display: flex !important;
        flex-direction: column !important;
        gap: 8px !important;
    }

    .recipe-action-btn {
        background-color: rgba(24, 24, 24, 0.8) !important;
        border: 1px solid var(--prime-color3) !important;
        color: var(--white) !important;
        width: 32px !important;
        height: 32px !important;
        border-radius: 50% !important;
        display: flex !important;
        align-items: center;
        justify-content: center;
        padding: 0 !important;
        cursor: pointer !important;
        transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .recipe-action-btn:hover {
        color: #ffffff !important;
        transform: scale(1.1);
    }

    .delete-recipe-btn:hover {
        background-color: var(--red) !important;
        border-color: var(--red) !important;
    }

    .cart-recipe-btn:hover {
        background-color: #198754 !important;
    }

    .clock-recipe-btn:hover {
        background-color: #0dcaf0 !important;
    }

    /* Wechselt zu Zeile auf Mobilgeräten, um vertikale Überläufe zu verhindern */
    @media (max-width: 575.98px) {
        .recipe-actions-container {
            flex-direction: row !important;
            top: 8px !important;
            right: 8px !important;
            gap: 6px !important;
        }
        .recipe-action-btn {
            width: 28px !important;
            height: 28px !important;
        }
        .recipe-action-btn i {
            font-size: 14px !important;
        }
    }
</style>

<div class="recipe-actions-container">
    <button class="recipe-action-btn delete-recipe-btn" title="Aus Favoriten entfernen">
        <i class="bi bi-trash"></i>
    </button>
    <button class="recipe-action-btn cart-recipe-btn" title="In die Einkaufsliste">
        <i class="bi bi-cart3"></i>
    </button>
    <button class="recipe-action-btn clock-recipe-btn" title="In den KI Kochplaner">
        <i class="bi bi-clock"></i>
    </button>
</div>

<script>
    window.initRecipeButtons = function(cards, templateContainer) {
        if (!cards || !templateContainer) return;

        cards.forEach(card => {
            if (card.querySelector('.recipe-actions-container')) return;

            const actionGroup = templateContainer.cloneNode(true);

            // 1. Aus Favoriten löschen
            const deleteBtn = actionGroup.querySelector('.delete-recipe-btn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    card.closest('.col-custom-grid').style.opacity = '0.3'; 
                });
            }

            // 2. Warenkorb
            const cartBtn = actionGroup.querySelector('.cart-recipe-btn');
            if (cartBtn) {
                cartBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log('In Einkaufsliste verschoben');
                });
            }

            // 3. Uhr-Symbol: Speichert im localStorage für den KI-Planer
            const clockBtn = actionGroup.querySelector('.clock-recipe-btn');
            if (clockBtn) {
                clockBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    if (typeof extractDataFromHTMLCard === 'function' && typeof saveRecipeToTemporaryStorage === 'function') {
                        const recipeData = extractDataFromHTMLCard(card);
                        saveRecipeToTemporaryStorage(recipeData);
                    } else {
                        console.error('recipe_storage.js nicht gefunden.');
                    }
                });
            }

            card.prepend(actionGroup);
        });
    };
</script>
