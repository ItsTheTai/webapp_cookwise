<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise - Einkaufsliste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/shoppinglist.css">
</head>

<body>

    <div id="navbar"></div>

    <main class="custom-center-container my-4">
        <h1 class="main-logo-font mb-4">Einkaufsliste</h1>

        <div class="mb-4">

            <div class="container py-4">

                <!-- Rezepte -->
                <h5 class="mb-3">Rezepte filtern:</h5>

                <div id="recipe-filter-container" class="mb-4 d-flex flex-wrap gap-2">


                </div>

                <div class="table-container">

                    <table>
                        <thead>
                            <tr>
                                <th class="col-check"> </th>
                                <th>Zutat</th>
                                <th>Menge</th>
                                <th>Rezepte</th>
                            </tr>
                        </thead>

                        <tr>
                            <td>
                                <button type="button" class="btn btn-primary btn-sm" id="addIngredientBtn">
                                    Hinzufügen
                                </button>
                            </td>

                            <td>
                                <input type="text" id="ingredientName" placeholder="Zutat">
                            </td>

                            <td>
                                <input type="number" id="ingredientAmount" placeholder="Menge" style="width: 70px;">
                                <input type="text" id="ingredientUnit" placeholder="Einheit" style="width: 70px;">
                            </td>

                            <td>
                                <input type="text" id="ingredientRecipe" placeholder="Rezept">
                            </td>
                        </tr>

                        <tbody id="shoppinglist-body">

                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center p-3 border-top border-secondary">

            <button id="btn-clear-all" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                <i class="bi bi-trash3 me-1"></i>Liste leeren
            </button>

        </div>


    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle_theme.js"></script>
    <script src="../js/load_components.js"></script>
    <script src="../js/shoppinglist.js"></script>

</body>

</html>
