<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CookWise - Einkaufsliste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/shoppinglist.css">

<body>


    <div id="navbar"></div>

    <main class="custom-center-container my-4">
        <h1 class="main-logo-font mb-4">Einkaufsliste</h1>

        <div class="mb-4">

            <div class="container py-4">

                <!-- Rezepte -->
                <h5 class="mb-3">Rezepte filtern:</h5>

                <div class="mb-4 d-flex flex-wrap gap-2">

                    <span class="badge d-flex align-items-center gap-2 p-2 chip">
                        Ingwer-Suppe
                        <button type="button" class="btn-close btn-close-white btn-sm"></button>
                    </span>

                    <span class="badge bg-primary d-flex align-items-center gap-2 p-2 chip active">
                        Linsen-Curry
                        <button type="button" class="btn-close btn-close btn-sm"></button>
                    </span>

                </div>

                <div class="table-container">

                    <table>
                        <thead>
                            <tr>
                                <th class="col-check"></th>
                                <th>Zutat</th>
                                <th>Menge</th>
                                <th>Rezepte</th>
                            </tr>
                        </thead>

                        <tbody>

                            <tr>
                                <td><button>Hinzufügen</button></td>
                                <td><input type="text"></td>
                            </tr>

                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Zwiebeln</td>
                                <td>5 Stk</td>
                                <td>Ingwersuppe, Linsencurry</td>
                            </tr>

                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Knoblauch</td>
                                <td>4 Zehen</td>
                                <td>Ingwersuppe, Linsencurry</td>
                            </tr>

                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Gemüsebrühe</td>
                                <td>2.0 L</td>
                                <td>Ingwersuppe</td>
                            </tr>

                            <tr>
                                <td><input type="checkbox"></td>
                                <td>Ingwer</td>
                                <td>1 Knolle</td>
                                <td>Ingwersuppe</td>
                            </tr>
                        </tbody>
                    </table>

                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center p-3 border-top border-secondary">

                <input type="text" class="form-control form-control-sm w-25" placeholder="Zutat suchen">

                <button id="btn-clear-all" class="btn btn-sm btn-outline-danger rounded-pill px-3">
                    <i class="bi bi-trash3 me-1"></i>Liste leeren
                </button>

            </div>


    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/toggle_theme.js"></script>
    <script src="../js/load_components.js"></script>

</body>

</html>
